<!DOCTYPE html>
<html>
<head>
<title>Contact - Bike Showroom</title>

<meta name="viewport" content="width=device-width, initial-scale=1">

<link rel="stylesheet"
href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">

<style>

/* basic styling */

body{
font-family:Arial;
background:#f4f4f4;
margin:0;
}

/* header */

header{
background:#222;
color:white;
text-align:center;
padding:15px;
}

/* navbar */

nav{
display:flex;
justify-content:center;
gap:20px;
margin-top:10px;
}

nav a{
color:white;
text-decoration:none;
font-weight:bold;
}

/* pseudo class */

nav a:hover{
color:yellow;
}

/* contact container */

.contact-container{
display:flex;
justify-content:center;
align-items:center;
gap:40px;
padding:40px;
flex-wrap:wrap;
}

/* form */

form{
background:white;
padding:20px;
border-radius:8px;
width:300px;
box-shadow:0 0 10px rgba(0,0,0,0.2);
}

input, textarea, select{
width:100%;
padding:8px;
margin:8px 0;
border:1px solid gray;
border-radius:5px;
}

/* transition */

button{
transition:0.3s;
}

button:hover{
transform:scale(1.05);
}

/* map */

.map iframe{
border-radius:8px;
}

/* responsive */

@media(max-width:768px){

.contact-container{
flex-direction:column;
}

}

</style>

</head>

<body>

<header>

<h1>Bike Showroom</h1>

<nav>
<a href="index.html">Home</a>
<a href="bikes.html">Bikes</a>
<a href="contact.html">Contact</a>
</nav>

</header>


<h2 style="text-align:center;margin-top:20px;">Contact Us</h2>

<div class="contact-container">

<!-- Form -->

<form>

<label>Name</label>
<input type="text" placeholder="Enter your name">

<label>Email</label>
<input type="email" placeholder="Enter your email">

<label>Select Bike</label>

<select>
<option>Yamaha R15</option>
<option>KTM RC 200</option>
<option>Royal Enfield</option>
</select>

<label>Message</label>
<textarea placeholder="Your message"></textarea>

<button class="btn btn-primary">Submit</button>

</form>


<!-- Map -->

<div class="map">

<iframe width="300" height="250"
src="https://maps.google.com/maps?q=hyderabad&t=&z=13&ie=UTF8&iwloc=&output=embed">
</iframe>

</div>

</div>


<footer style="text-align:center;padding:10px;background:#222;color:white">

<p>© 2026 Bike Showroom</p>

</footer>

</body>
</html>
